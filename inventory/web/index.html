<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Inventory</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="topbar">
    <div class="title">Inventory</div>
    <div id="healthPill" class="pill">DB: ...</div>
  </header>

  <main class="container">
    <section class="card">
      <h2>Zoeken</h2>
      <div class="row">
        <input id="search" placeholder="Zoek in artikelen, locaties en dozen..." />
      </div>
    </section>

    <section class="card">
      <h2>Nieuw artikel</h2>

      <form id="itemForm" class="grid">
        <label>
          Naam artikel *
          <input id="name" required />
        </label>

        <label>
          Waar gekocht (winkel)
          <input id="store" />
        </label>

        <label>
          Garantie (maanden)
          <input id="warranty_months" type="number" min="0" step="1" />
        </label>

        <label>
          Artikelnummer
          <input id="article_no" />
        </label>

        <label>
          Aankoopdatum
          <input id="purchase_date" type="date" />
        </label>

        <label class="span2">
          Notities
          <textarea id="notes" rows="3"></textarea>
        </label>

        <div class="span2 actions">
          <button type="submit">Opslaan</button>
          <button type="button" id="resetBtn" class="secondary">Leegmaken</button>
        </div>
      </form>
    </section>

    <section class="card">
      <h2>Artikelen</h2>
      <div id="items" class="items"></div>
    </section>

    <section class="card">
      <h2>Inventaris (locaties &amp; dozen)</h2>

      <div class="split">
        <div class="subcard">
          <h3>Locaties</h3>
          <div class="row">
            <input id="locName" placeholder="Bijv. Zolder, Schuur, Garage" />
            <button id="addLocBtn" type="button">Toevoegen</button>
          </div>
          <div id="locationsList" class="list"></div>
        </div>

        <div class="subcard">
          <h3>Dozen</h3>
          <div class="grid2">
            <input id="boxCode" placeholder="Code (bijv. BOX-001)" />
            <input id="boxLabel" placeholder="Label (bijv. Kerstspullen)" />
            <select id="boxLocation"></select>
            <button id="addBoxBtn" type="button">Doos toevoegen</button>
          </div>
          <div id="boxesList" class="list"></div>
        </div>
      </div>
    </section>
  </main>

  <dialog id="receiptsDlg" class="dlg">
    <form method="dialog" class="dlgInner">
      <div class="dlgHeader">
        <h3>Kassabonnen</h3>
        <button value="close" class="secondary">Sluiten</button>
      </div>

      <div class="dlgBody">
        <div class="row">
          <div>
            <div class="hint">Scan/upload kassabon (telefoon)</div>
            <input id="receiptFile" type="file" accept="image/*" capture="environment" />
          </div>
          <div class="right">
            <button type="button" id="uploadReceiptBtn">Upload</button>
          </div>
        </div>

        <div id="receiptsList" class="receipts"></div>
      </div>
    </form>
  </dialog>

  <dialog id="boxDlg" class="dlg">
    <form method="dialog" class="dlgInner">
      <div class="dlgHeader">
        <h3 id="boxDlgTitle">Doos</h3>
        <button value="close" class="secondary">Sluiten</button>
      </div>

      <div class="dlgBody">
        <div class="row">
          <div class="hint" id="boxDlgMeta"></div>
        </div>

        <div id="boxItemsList" class="items"></div>
      </div>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
